services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reel_captioning}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-reel_captioning}
      REDIS_URL: redis://redis:6379/0
      STORAGE_ROOT: /app/storage
      FFMPEG_BIN: /usr/bin/ffmpeg
      FFPROBE_BIN: /usr/bin/ffprobe
      CORS_ORIGINS: '["https://${DOMAIN}"]'
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-150}
      MAX_DURATION_SECONDS: ${MAX_DURATION_SECONDS:-180}
      WHISPERX_MODEL: ${WHISPERX_MODEL:-base}
    depends_on:
      - postgres
      - redis
    volumes:
      - shared_storage:/app/storage

  worker:
    build:
      context: ./backend
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=1 --prefetch-multiplier=1 --max-tasks-per-child=10 -B
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-reel_captioning}
      REDIS_URL: redis://redis:6379/0
      STORAGE_ROOT: /app/storage
      FFMPEG_BIN: /usr/bin/ffmpeg
      FFPROBE_BIN: /usr/bin/ffprobe
      WHISPERX_MODEL: ${WHISPERX_MODEL:-base}
    depends_on:
      - postgres
      - redis
    volumes:
      - shared_storage:/app/storage

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ""
    restart: unless-stopped
    depends_on:
      - backend

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  shared_storage:
  caddy_data:
  caddy_config:
